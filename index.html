<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Happy Birthday, Bunny</title>
    <meta
      name="description"
      content="An interactive birthday letter for Bunny."
    />
    <style>
:root {
  --ink: #241116;
  --cream: #fff9ef;
  --paper: #fff4df;
  --rose: #9b173d;
  --rose-bright: #e75774;
  --gold: #f4c45f;
  --green: #2f6f63;
  --deep-green: #103c38;
  --night: #14090d;
  --shadow: 0 22px 60px rgba(36, 17, 22, 0.24);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-width: 320px;
  background: var(--night);
  color: var(--cream);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
  line-height: 1.5;
}

button {
  font: inherit;
}

.scroll-progress {
  position: fixed;
  inset: 0 0 auto;
  z-index: 40;
  height: 4px;
  background: rgba(255, 249, 239, 0.12);
}

.scroll-progress span {
  display: block;
  width: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--rose-bright), var(--gold), #64c5a9);
  transition: width 120ms linear;
}

.song-frame {
  position: fixed;
  top: -240px;
  left: -320px;
  width: 220px;
  height: 124px;
  opacity: 0;
  pointer-events: none;
}

.music-dock {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 35;
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: calc(100vw - 36px);
  padding: 8px 12px 8px 8px;
  color: var(--cream);
  background: rgba(20, 9, 13, 0.74);
  border: 1px solid rgba(255, 249, 239, 0.26);
  border-radius: 999px;
  box-shadow: 0 16px 36px rgba(0, 0, 0, 0.28);
  backdrop-filter: blur(16px);
}

.music-dock span {
  overflow: hidden;
  max-width: 148px;
  font-size: 0.86rem;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.icon-button,
.primary-action,
.secondary-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 0;
  cursor: pointer;
  transition:
    transform 180ms ease,
    background 180ms ease,
    color 180ms ease,
    border-color 180ms ease;
}

.icon-button {
  position: relative;
  flex: 0 0 auto;
  width: 42px;
  height: 42px;
  color: var(--cream);
  background: rgba(255, 249, 239, 0.12);
  border: 1px solid rgba(255, 249, 239, 0.22);
  border-radius: 50%;
}

.icon-button svg {
  width: 21px;
  height: 21px;
}

.song-link {
  color: var(--cream);
  text-decoration: none;
}

.icon-button:hover,
.primary-action:hover,
.secondary-action:hover {
  transform: translateY(-2px);
}

.icon-button:focus-visible,
.primary-action:focus-visible,
.secondary-action:focus-visible,
.reason-card:focus-visible {
  outline: 3px solid rgba(244, 196, 95, 0.95);
  outline-offset: 3px;
}

[data-tooltip]::after {
  position: absolute;
  right: 0;
  bottom: calc(100% + 9px);
  width: max-content;
  max-width: 170px;
  padding: 6px 8px;
  color: var(--ink);
  font-size: 0.78rem;
  line-height: 1.2;
  pointer-events: none;
  content: attr(data-tooltip);
  background: var(--cream);
  border-radius: 6px;
  box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
  opacity: 0;
  transform: translateY(5px);
  transition:
    opacity 160ms ease,
    transform 160ms ease;
}

[data-tooltip]:hover::after,
[data-tooltip]:focus-visible::after {
  opacity: 1;
  transform: translateY(0);
}

.page {
  overflow: hidden;
}

.hero {
  position: relative;
  display: grid;
  min-height: 92svh;
  padding: 128px 7vw 96px;
  isolation: isolate;
  place-items: center start;
}

.hero-image,
.hero-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.hero-image {
  z-index: -3;
  object-fit: cover;
  object-position: center;
}

.hero-overlay {
  z-index: -2;
  background:
    radial-gradient(circle at 18% 72%, rgba(155, 23, 61, 0.42), transparent 30%),
    linear-gradient(90deg, rgba(20, 9, 13, 0.94), rgba(20, 9, 13, 0.58) 46%, rgba(20, 9, 13, 0.12)),
    linear-gradient(180deg, rgba(20, 9, 13, 0.18), rgba(20, 9, 13, 0.62));
}

.hero-content {
  width: min(690px, 100%);
  text-shadow: 0 3px 24px rgba(0, 0, 0, 0.46);
}

.eyebrow {
  margin: 0 0 14px;
  color: var(--gold);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.eyebrow.dark {
  color: var(--green);
}

.eyebrow.light {
  color: #a6f0db;
}

h1,
h2 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0;
}

h1 {
  max-width: 680px;
  color: var(--cream);
  font-size: 4.5rem;
}

h2 {
  color: inherit;
  font-size: 3.2rem;
}

.hero-copy {
  max-width: 590px;
  margin: 22px 0 0;
  color: rgba(255, 249, 239, 0.88);
  font-size: 1.16rem;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 34px;
}

.primary-action,
.secondary-action {
  min-height: 48px;
  gap: 10px;
  padding: 0 18px;
  border-radius: 999px;
  font-weight: 800;
  white-space: nowrap;
}

.primary-action {
  color: var(--ink);
  background: var(--cream);
  box-shadow: 0 15px 36px rgba(0, 0, 0, 0.28);
}

.primary-action:hover {
  background: #ffe6c7;
}

.primary-action svg,
.secondary-action svg {
  width: 20px;
  height: 20px;
  flex: 0 0 auto;
}

.letter-band {
  position: relative;
  padding: 76px 0 88px;
  color: var(--ink);
  background:
    linear-gradient(180deg, rgba(255, 249, 239, 0.95), rgba(255, 244, 223, 0.98)),
    var(--cream);
}

.section-inner {
  width: min(1120px, calc(100% - 36px));
  margin: 0 auto;
}

.section-heading {
  display: grid;
  gap: 8px;
  margin-bottom: 28px;
}

.letter-paper {
  position: relative;
  overflow: hidden;
  padding: 48px;
  color: #35191f;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 34%),
    linear-gradient(180deg, rgba(255, 249, 239, 0.98), rgba(255, 237, 206, 0.96));
  border: 1px solid rgba(155, 23, 61, 0.18);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.letter-paper::before {
  position: absolute;
  inset: 18px;
  pointer-events: none;
  content: "";
  border: 1px solid rgba(155, 23, 61, 0.18);
  border-radius: 6px;
}

.paper-glow {
  position: absolute;
  right: -120px;
  top: -120px;
  width: 300px;
  height: 300px;
  pointer-events: none;
  background: radial-gradient(circle, rgba(244, 196, 95, 0.34), transparent 68%);
}

.letter-body {
  position: relative;
  z-index: 1;
  margin: 0;
  white-space: pre-wrap;
  word-break: normal;
  overflow-wrap: anywhere;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.08rem;
  line-height: 1.78;
}

.reason-band {
  padding: 78px 0 110px;
  color: var(--cream);
  background:
    radial-gradient(circle at 18% 18%, rgba(231, 87, 116, 0.18), transparent 32%),
    linear-gradient(160deg, var(--deep-green), #1b1518 70%);
}

.reason-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 12px;
  min-height: 252px;
}

.reason-intro {
  max-width: 720px;
  margin: -4px 0 28px;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  color: rgba(255, 249, 239, 0.86);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.16rem;
  line-height: 1.7;
}

.reason-card {
  display: grid;
  min-height: 96px;
  padding: 16px;
  color: var(--cream);
  text-align: left;
  background: rgba(255, 249, 239, 0.1);
  border: 1px solid rgba(255, 249, 239, 0.18);
  border-radius: var(--radius);
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.16);
  align-content: start;
  animation: riseIn 360ms ease both;
}

.reason-card span {
  color: var(--gold);
  font-size: 0.84rem;
  font-weight: 900;
}

.reason-card p {
  margin: 8px 0 0;
  color: rgba(255, 249, 239, 0.92);
  font-size: 0.98rem;
}

.reason-controls {
  display: flex;
  justify-content: center;
  margin-top: 26px;
}

.secondary-action {
  color: var(--cream);
  background: rgba(255, 249, 239, 0.12);
  border: 1px solid rgba(255, 249, 239, 0.28);
}

.secondary-action:hover {
  color: var(--ink);
  background: var(--gold);
  border-color: var(--gold);
}

.top-button {
  position: fixed;
  right: 18px;
  bottom: 82px;
  z-index: 34;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
}

.top-button.is-visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.floating-heart {
  position: fixed;
  z-index: 50;
  color: var(--rose-bright);
  font-size: 1.25rem;
  pointer-events: none;
  animation: floatHeart 1200ms ease-out forwards;
}

@keyframes riseIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes floatHeart {
  0% {
    opacity: 0;
    transform: translate(-50%, -30%) scale(0.72) rotate(0deg);
  }
  20% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(var(--drift-x), -170px) scale(1.18) rotate(var(--spin));
  }
}

@media (max-width: 760px) {
  .hero {
    min-height: 90svh;
    padding: 104px 22px 72px;
    place-items: end start;
  }

  .hero-overlay {
    background:
      linear-gradient(180deg, rgba(20, 9, 13, 0.08), rgba(20, 9, 13, 0.92)),
      linear-gradient(90deg, rgba(20, 9, 13, 0.68), rgba(20, 9, 13, 0.16));
  }

  h1 {
    font-size: 2.8rem;
  }

  h2 {
    font-size: 2.25rem;
  }

  .hero-copy {
    font-size: 1rem;
  }

  .letter-band,
  .reason-band {
    padding-top: 56px;
  }

  .letter-paper {
    padding: 30px 22px;
  }

  .letter-paper::before {
    inset: 10px;
  }

  .letter-body {
    font-size: 1rem;
    line-height: 1.68;
  }

  .music-dock {
    right: 12px;
    bottom: 12px;
  }

  .top-button {
    right: 12px;
    bottom: 74px;
  }
}

@media (max-width: 460px) {
  .primary-action,
  .secondary-action {
    width: 100%;
  }

  .music-dock span {
    max-width: 112px;
  }

  .reason-grid {
    grid-template-columns: 1fr;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

    <script type="text/plain" id="letter-source">Hi bunny, 
Firstly happy birthday bunny♥️, I’m soo grateful for you being in my life, writing these messages and saying doesn’t do justice of how much I love you and how much you mean to me♥️.

You are a type of a person that made me start romanticizing life again.
Suddenly songs hit harder, nights feel softer, and even the most ordinary moments start feeling worth remembering just because you were part of them♥️♥️.

    <script>
const VIDEO_ID = "fX41N940bMU";
const INITIAL_REASON_COUNT = 9;
const REASON_STEP = 12;

const scrollBar = document.querySelector("#scrollBar");
const openLetterButton = document.querySelector("#openLetter");
const letterSection = document.querySelector("#letter");
const letterBody = document.querySelector("#letterBody");
const letterSource = document.querySelector("#letter-source");
const reasonIntro = document.querySelector("#reasonIntro");
const reasonGrid = document.querySelector("#reasonGrid");
const revealReasonsButton = document.querySelector("#revealReasons");
const topButton = document.querySelector("#topButton");
const musicToggle = document.querySelector("#musicToggle");
const musicStatus = document.querySelector("#musicStatus");
const songFrame = document.querySelector("#song-player");
const songBaseUrl = `https://www.youtube.com/embed/${VIDEO_ID}?enablejsapi=1&loop=1&playlist=${VIDEO_ID}&playsinline=1&controls=0&rel=0&modestbranding=1`;
const songAutoplayUrl = `${songBaseUrl}&autoplay=1`;
const songMutedAutoplayUrl = `${songAutoplayUrl}&mute=1`;

let player;
let playerReady = false;
let songPlaying = false;
let audioRequested = false;
let audioUnlocked = false;
let visibleReasons = INITIAL_REASON_COUNT;

const letterText = letterSource.textContent.replace(/\n$/, "");
const letterLines = letterText.split(/\r?\n/);
const reasonBlockStart = letterLines.findIndex(
  (line) => line.trim() === "Now let me tell you 3 reasons why I love you",
);

const reasonStart = letterLines.findIndex(
  (line) => line.trim() === "You thought there are only 3",
);

const visibleLetterLines =
  reasonBlockStart >= 0 ? letterLines.slice(0, reasonBlockStart) : letterLines;
letterBody.textContent = visibleLetterLines.join("\n").trimEnd();

if (reasonIntro && reasonBlockStart >= 0 && reasonStart >= reasonBlockStart) {
  reasonIntro.textContent = letterLines
    .slice(reasonBlockStart, reasonStart + 1)
    .join("\n")
    .trim();
}

const reasonLines = letterText
  .split(/\r?\n/)
  .slice(reasonStart + 1)
  .map((line) => line.trim())
  .filter((line) => /^\d+\.\s/.test(line));

function updateScrollProgress() {
  const scrollTop = window.scrollY;
  const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;

  scrollBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
  topButton.classList.toggle("is-visible", scrollTop > window.innerHeight * 0.65);
}

function renderReasons() {
  reasonGrid.innerHTML = "";

  reasonLines.slice(0, visibleReasons).forEach((line, index) => {
    const match = line.match(/^(\d+)\.\s(.+)$/);
    const number = match ? match[1] : String(index + 1);
    const text = match ? match[2] : line;
    const card = document.createElement("article");

    card.className = "reason-card";
    card.tabIndex = 0;
    card.style.animationDelay = `${Math.min(index % REASON_STEP, 8) * 35}ms`;
    card.innerHTML = `<span>${number.padStart(2, "0")}</span><p></p>`;
    card.querySelector("p").textContent = text;
    reasonGrid.appendChild(card);
  });

  const allVisible = visibleReasons >= reasonLines.length;
  revealReasonsButton.hidden = allVisible;
}

function burstHearts(originX, originY) {
  for (let index = 0; index < 24; index += 1) {
    const heart = document.createElement("span");
    const drift = (Math.random() - 0.5) * 180;
    const spin = (Math.random() - 0.5) * 80;

    heart.className = "floating-heart";
    heart.textContent = "\u2665";
    heart.style.left = `${originX + (Math.random() - 0.5) * 44}px`;
    heart.style.top = `${originY + (Math.random() - 0.5) * 24}px`;
    heart.style.setProperty("--drift-x", `${drift}px`);
    heart.style.setProperty("--spin", `${spin}deg`);
    document.body.appendChild(heart);

    window.setTimeout(() => heart.remove(), 1300);
  }
}

function setMusicState(isPlaying, statusText) {
  songPlaying = isPlaying;
  musicToggle.setAttribute(
    "aria-label",
    isPlaying ? "Pause birthday song" : "Play birthday song",
  );
  musicToggle.dataset.tooltip = isPlaying ? "Pause song" : "Play song";
  musicStatus.textContent =
    statusText || (isPlaying ? "Song playing" : "Tap anywhere for song");
}

function refreshSongFrame(muted = false) {
  songFrame.src = `${muted ? songMutedAutoplayUrl : songAutoplayUrl}&retry=${Date.now()}`;
}

function startSongWithAudio() {
  audioRequested = true;
  audioUnlocked = true;
  musicStatus.textContent = "Starting song";

  if (!playerReady || !player) {
    refreshSongFrame(false);
    return;
  }

  try {
    player.unMute();
    player.setVolume(76);
    player.playVideo();
  } catch (error) {
    refreshSongFrame(false);
  }
}

function startMutedAutoplay() {
  if (!playerReady || !player) {
    return;
  }

  if (audioRequested) {
    startSongWithAudio();
    return;
  }

  try {
    player.mute();
    player.setVolume(76);
    player.playVideo();
    setMusicState(false, "Tap anywhere for song");
  } catch (error) {
    setMusicState(false, "Tap anywhere for song");
  }
}

function unlockAudioFromFirstInteraction() {
  if (!audioUnlocked) {
    startSongWithAudio();
  }
}

window.onYouTubeIframeAPIReady = () => {
  player = new YT.Player("song-player", {
    events: {
      onReady: () => {
        playerReady = true;
        startMutedAutoplay();
      },
      onStateChange: (event) => {
        if (event.data === YT.PlayerState.PLAYING) {
          const isMuted =
            typeof player.isMuted === "function" ? player.isMuted() : !audioRequested;
          setMusicState(
            audioRequested && !isMuted,
            isMuted ? "Tap anywhere for song" : "Song playing",
          );
        }

        if (
          event.data === YT.PlayerState.PAUSED ||
          event.data === YT.PlayerState.ENDED
        ) {
          setMusicState(false);
        }
      },
    },
  });
};

openLetterButton.addEventListener("click", (event) => {
  const rect = event.currentTarget.getBoundingClientRect();

  burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
  letterSection.scrollIntoView({ behavior: "smooth", block: "start" });
  startSongWithAudio();
});

revealReasonsButton.addEventListener("click", () => {
  visibleReasons = Math.min(visibleReasons + REASON_STEP, reasonLines.length);
  renderReasons();
});

topButton.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

musicToggle.addEventListener("click", () => {
  if (songPlaying && playerReady && player) {
    player.pauseVideo();
  } else {
    startSongWithAudio();
  }
});

document.addEventListener("pointerdown", unlockAudioFromFirstInteraction, {
  once: true,
  passive: true,
});
document.addEventListener("keydown", unlockAudioFromFirstInteraction, { once: true });
window.addEventListener("scroll", updateScrollProgress, { passive: true });
window.addEventListener("resize", updateScrollProgress);

window.setTimeout(() => {
  if (!songPlaying) {
    musicStatus.textContent = "Tap anywhere for song";
  }
}, 2600);

renderReasons();
updateScrollProgress();

    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
